name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Use `npm install` rather than `npm ci`: the lockfile resolves
      # differently across Node/npm versions for platform-specific
      # transitive deps (notably @emnapi/* on Linux x64). `npm ci`
      # treats that as fatal; `npm install` updates the lockfile in
      # place. Vercel handles bit-exact production resolution from
      # its own cache — CI here is for typecheck/lint/test gating, not
      # for reproducible deploys.
      - name: Install
        run: npm install --no-audit --no-fund

      # Typecheck before lint/test — a TS failure is the most common
      # regression class and the cheapest to surface first.
      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
